      <h1>玻璃碳标样</h1>
      <p class="subtitle-en">glassy carbon calibration standard</p>

      <h2>定义</h2>
      <p><strong>玻璃碳</strong>因散射截面平滑、稳定、易保存，被广泛用作二级绝对强度标准。将样品与标样在同一几何下比较，把相对 $I(q)$ 转到 $\mathrm{cm}^{-1}$。</p>

      <h2>物理直觉</h2>
      <p>注意批次差异、狭缝 smeared 曲线与针孔曲线不可混用标定因子；SRM 3600 提供认证 $Q$ 区截面。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="absolute-intensity">绝对强度</span></li>
        <li><span data-term="usaxs">超小角散射</span></li>
        <li><span data-term="instrument-smearing">仪器模糊</span></li>
      </ul>
