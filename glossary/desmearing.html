      <h1>去模糊</h1>
      <p class="subtitle-en">desmearing</p>

      <h2>定义</h2>
      <p><strong>Desmearing</strong> 试图解除仪器狭缝高度/波长展宽造成的卷积。经典有 Lake 迭代等方法；不适定，噪声会被放大。</p>

      <h2>物理直觉</h2>
      <p>现代做法常优先「把模型 smeared 后再拟合」；若必须 desmear，须报告分辨率函数与算法。</p>
