      <h1>从头形状重建</h1>
      <p class="subtitle-en">ab initio shape reconstruction</p>

      <h2>定义</h2>
      <p><strong>从头（ab initio）形状重建</strong>在不依赖高分辨原子坐标的前提下，用哑原子/珠粒模型拟合溶液散射，得到低分辨包络。ATSAS 中经典程序为 DAMMIN/DAMMIF 等。</p>

      <h2>物理直觉</h2>
      <p>前提是样品尽量单分散、数据已做严格 QC。多轮独立运行与聚类评估歧义性；柔性体系应改用系综方法而非单一形状。</p>

      <h2>相关词条</h2>

        <li><span data-term="ensemble-optimization">系综优化方法</span></li>
        <li><span data-term="pair-distance-distribution">距离分布函数</span></li>
      </ul>
