      <h1>透射率</h1>
      <p class="subtitle-en">sample transmission</p>

      <h2>定义</h2>
      <p><strong>透射率</strong> $T_r$（或 $T$）是样品存在时直射束强度相对空束（或空池）的比值。还原链中本底扣除与绝对化常以 $I/T_r$ 形式出现。</p>

      <h2>物理直觉</h2>
      <p>测量可用离子室、半透束阻或衰减器。气泡、厚度不均、温控改变路径都会使 $T_r$ 跳变——时间分辨实验须逐帧监测透射。</p>

      <h2>相关词条</h2>

        <li><span data-term="absolute-intensity">绝对强度</span></li>
        <li><span data-term="beamstop">束阻</span></li>

      </ul>
