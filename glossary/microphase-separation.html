      <h1>微相分离</h1>
      <p class="subtitle-en">microphase separation</p>

      <h2>定义</h2>
      <p><strong>微相分离</strong>描述嵌段共聚物中：嵌段化学不相容驱动相分离，共价连接限制相域在纳米尺度。透射 SAS 出现峰位 $q^*$ 对应畴间距 $d=2\pi/q^*$，峰列反映对称性。</p>

      <h2>物理直觉</h2>
      <p>与稀溶液蛋白 Guinier 范式不同：这里 $S(q)$ 峰是主角。薄膜中还受表面能与锚定影响，常用 <span data-term="gisaxs">GISAXS</span>。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="block-copolymer">嵌段共聚物</span></li>
        <li><span data-term="order-disorder-transition">有序–无序转变</span></li>
        <li><span data-term="structure-factor">结构因子</span></li>
      </ul>
