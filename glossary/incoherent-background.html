      <h1>不相干本底</h1>
      <p class="subtitle-en">incoherent background</p>

      <h2>定义</h2>
      <p><strong>不相干本底</strong>来自不形成干涉的散射过程（及部分非弹性贡献在仪器上的投影）。它近似不依赖 $q$（或缓慢变化），会抬高高 $q$ 尾并污染 Porod/模型拟合。</p>

      <h2>物理直觉</h2>
      <p>SANS 高氢样品本底大；常用溶剂空白、已知标准或模型平坦项扣除。勿把未扣本底的「假 Porod」当真。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="coherent-scattering">相干散射</span></li>
        <li><span data-term="porod-law">Porod 定律</span></li>
        <li><span data-term="sans">小角中子散射</span></li>
      </ul>
