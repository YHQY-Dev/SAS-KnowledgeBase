      <h1>GIFT</h1>
      <p class="subtitle-en">generalized indirect Fourier transformation</p>

      <h2>定义</h2>
      <p><strong>GIFT</strong>（generalized IFT）在 IFT 框架中引入相互作用，试图同时提取 $P(q)$ 与 $S(q)$ 相关信息，常用于带电胶束/胶体。</p>

      <h2>物理直觉</h2>
      <p>参数更多、简并风险更高；须浓度系列与模型约束。与稀释极限下的 GNOM 路线互补而非替代。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="gnom">GNOM</span></li>
        <li><span data-term="structure-factor">结构因子</span></li>
        <li><span data-term="indirect-fourier-transform">间接傅里叶变换</span></li>
      </ul>
