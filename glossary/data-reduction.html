      <h1>数据还原</h1>
      <p class="subtitle-en">data reduction</p>

      <h2>定义</h2>
      <p><strong>数据还原</strong>是把探测器原始计数变成可用于科学解释的 $I(q)$（及误差）的全部步骤，通常包括暗电流、平场、掩膜、透射归一、本底扣除、几何到 $q$ 的映射与径向平均等。</p>

      <h2>物理直觉</h2>
      <p>顺序错误会产生隐蔽系统误差；绝对标定常作为还原链末步或独立 AU 步骤。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="radial-average">径向平均</span></li>
        <li><span data-term="transmission">透射率</span></li>
        <li><span data-term="absolute-intensity">绝对强度</span></li>
        <li><span data-term="beamstop">束阻</span></li>
      </ul>
