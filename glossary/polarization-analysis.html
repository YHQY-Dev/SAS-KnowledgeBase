      <h1>极化分析</h1>
      <p class="subtitle-en">neutron polarization analysis</p>

      <h2>定义</h2>
      <p><strong>极化分析</strong>（含 SANSPOL、XYZ 极化分析等）控制入射中子自旋并分析散射中子自旋，从而把核相干、自旋不相干与磁散射截面分开。</p>

      <h2>物理直觉</h2>
      <p>校正链长（偏振度、翻转效率、本底）；磁场几何（垂直/平行于 $q$）改变可见的磁贡献。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="magnetic-sans">磁性小角中子散射</span></li>
        <li><span data-term="sans">小角中子散射</span></li>
        <li><span data-term="coherent-scattering">相干散射</span></li>
      </ul>

      <h2>出现于</h2>
      <ul>
        <li><a href="../topics/magnetic-sans/index.html">专题 magnetic-sans</a></li>
      </ul>
    </main>
