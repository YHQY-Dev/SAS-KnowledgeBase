      <h1>色谱联用小角散射</h1>
      <p class="subtitle-en">size-exclusion chromatography SAXS</p>

      <h2>定义</h2>
      <p><strong>SEC-SAXS</strong>（或 SEC-SAS）把尺寸排阻色谱流出液直接送入散射池连续采集。在单分散峰顶附近积分帧，可显著降低体相聚集与寡聚混合物的影响。</p>

      <h2>物理直觉</h2>
      <p>须对齐 UV 与 SAXS 时间轴、考虑柱后稀释与峰展宽；自动管道适合筛选，发表仍需人工 QC 与完整元数据。</p>
