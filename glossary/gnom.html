      <h1>GNOM</h1>
      <p class="subtitle-en">GNOM (regularized IFT)</p>

      <h2>定义</h2>
      <p><strong>GNOM</strong> 是溶液 SAS 中广泛使用的正则化 IFT 实现：在给定 $D_{\max}$ 下求解 $p(r)$，并用 OSCILL、POSITV、DISCRP 等感知准则帮助选择正则化强度。</p>

      <h2>物理直觉</h2>
      <p>输入须已是缓冲匹配、损伤检查后的曲线；电荷体系强 $S(q)$ 时可能需 GIFT/SQ-IFT 路线。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="indirect-fourier-transform">间接傅里叶变换</span></li>
        <li><span data-term="pair-distance-distribution">距离分布函数</span></li>
        <li><span data-term="maximum-dimension">最大尺寸</span></li>
        <li><span data-term="gift">GIFT</span></li>
      </ul>
