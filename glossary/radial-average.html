      <h1>径向平均</h1>
      <p class="subtitle-en">radial averaging</p>

      <h2>定义</h2>
      <p><strong>径向（环向）平均</strong>把以束心为圆心的等 $q$ 像素环上的强度求平均，得到 $I(q)$。各向同性溶液是默认假设；剪切、拉伸、GISAXS 等须改用扇区或保留 2D。</p>

      <h2>物理直觉</h2>
      <p>bin 宽度、掩膜质量与几何标定直接决定曲线光滑度与误差棒。错误束心会使低 $q$ 出现假峰或劈裂。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="scattering-vector-q">散射矢量 q</span></li>
        <li><span data-term="instrument-smearing">仪器模糊</span></li>
        <li><span data-term="gisaxs">掠入射小角 X 射线散射</span></li>
      </ul>
