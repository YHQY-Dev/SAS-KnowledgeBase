      <h1>多重散射</h1>
      <p class="subtitle-en">multiple scattering</p>

      <h2>定义</h2>
      <p><strong>多重散射</strong>指一次测量中发生两次及以上散射事件。单次散射近似下 $I(q)$ 直接对应结构因子；多重散射使曲线变形，低 $q$ 常被压平或抬高，视几何而定。</p>

      <h2>物理直觉</h2>
      <p>判据：减小厚度后曲线形状应不变；透射过低（如 $\ll e^{-1}$）时风险升高。USAXS/强衬度硬材料尤须警惕。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="transmission">透射率</span></li>
        <li><span data-term="absolute-intensity">绝对强度</span></li>
        <li><span data-term="usaxs">超小角散射</span></li>
      </ul>
