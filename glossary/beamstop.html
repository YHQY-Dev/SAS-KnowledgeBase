      <h1>束阻</h1>
      <p class="subtitle-en">beamstop</p>

      <h2>定义</h2>
      <p><strong>束阻</strong>置于探测器前（或飞行管末端）遮挡极强直射束。被遮挡区域对应最低 $q$ 的盲区；$q_{\min}$ 往往由束阻边缘而非理论几何决定。</p>

      <h2>物理直觉</h2>
      <p>掩膜须覆盖束阻阴影与半影；束阻过大使 Guinier 区丢失，过小则直射漏光烧毁像素。主动束阻可兼测透射。</p>

      <h2>相关词条</h2>

        <li><span data-term="forward-scattering">前向散射</span></li>
        <li><span data-term="transmission">透射率</span></li>
      </ul>
