      <h1>辐射损伤</h1>
      <p class="subtitle-en">radiation damage</p>

      <h2>定义</h2>
      <p><strong>辐射损伤</strong>指 X 射线（偶见中子热效应）引起的样品化学/结构变化。生物溶液中常见自由基诱导聚集，表现为 $R_g$、$I(0)$ 随帧增大，低 $q$ 上翘。</p>

      <h2>物理直觉</h2>
      <p>对策：缩短单帧、流动/护套流、加清除剂、比较首末帧、SEC 在线分离聚集体。报告须含损伤检查。</p>

      <h2>相关词条</h2>

        <li><span data-term="radius-of-gyration">回转半径</span></li>
        <li><span data-term="forward-scattering">前向散射</span></li>
      </ul>
