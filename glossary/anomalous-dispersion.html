      <h1>反常色散</h1>
      <p class="subtitle-en">anomalous dispersion</p>

      <h2>定义</h2>
      <p>远离吸收边时原子形状因子近似为电子数 $Z$；近边时出现复修正 $f'+if''$，使有效电子密度随能量变化。这就是 <span data-term="asaxs">ASAXS</span> 的物理基础。</p>

      <h2>物理直觉</h2>
      <p>须精确标定能量与 $f'(E)$（常联用荧光/XANES）；荧光本底与绝对强度一致性是主要实验难点。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="asaxs">反常小角散射</span></li>
        <li><span data-term="contrast">衬度</span></li>
        <li><span data-term="absolute-intensity">绝对强度</span></li>
      </ul>

      <h2>出现于</h2>

      </ul>
