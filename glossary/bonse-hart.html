      <h1>Bonse–Hart 光学</h1>
      <p class="subtitle-en">Bonse–Hart crystal collimation</p>

      <h2>定义</h2>
      <p><strong>Bonse–Hart</strong> 几何用通道切割完美晶体作为入射与分析单色/准直元件，实现极窄角分辨率，从而到达超小角 $q$。代价是通量损失与一维狭缝 smearing。</p>

      <h2>物理直觉</h2>
      <p>数据常需 <span data-term="desmearing">desmear</span> 或 smeared 模型拟合后才能与针孔 SAXS 比较。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="usaxs">超小角散射</span></li>
        <li><span data-term="instrument-smearing">仪器模糊</span></li>
        <li><span data-term="desmearing">去模糊</span></li>
      </ul>

      <h2>出现于</h2>

        <li><a href="../topics/usaxs/index.html">专题 usaxs</a></li>
        <li><a href="../learn/03-instruments.html">学习路径 03-instruments</a></li>
      </ul>
    </main>
