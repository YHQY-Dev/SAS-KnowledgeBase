      <h1>衬度匹配</h1>
      <p class="subtitle-en">contrast matching</p>

      <h2>定义</h2>
      <p><strong>衬度匹配</strong>指把溶剂的 <span data-term="scattering-length-density">SLD</span> 调到与某一相（如蛋白、脂质链、聚合物嵌段）相等，使该相 $\Delta\rho\approx 0$，散射贡献被压制。</p>

      <h2>物理直觉</h2>
      <p>匹配点附近信号极弱、对杂质敏感；须绝对强度与本底扣除严谨。多组分体系常测多个匹配点再建模（MONSA 等）。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="contrast">衬度</span></li>
        <li><span data-term="contrast-variation">衬度变化</span></li>
        <li><span data-term="sans">小角中子散射</span></li>
        <li><span data-term="scattering-length-density">散射长度密度</span></li>
      </ul>
