      <h1>衬度变化</h1>
      <p class="subtitle-en">contrast variation</p>

      <h2>定义</h2>
      <p><strong>衬度变化</strong>是在一系列已知衬度条件下测量 $I(q)$（或 $I(0)$），利用 $I\propto(\Delta\rho)^2$ 与交叉项分离组分形状与相对位置。Stuhrmann 分析常用 $\sqrt{I(0)}$ 对衬度作图。</p>

      <h2>物理直觉</h2>
      <p>先算 SLD 与匹配点再上机；可交换质子、不相干本底与浓度误差是主要系统误差源。</p>

      <h2>相关词条</h2>
      <ul>
        <li><span data-term="contrast-matching">衬度匹配</span></li>
        <li><span data-term="contrast">衬度</span></li>
        <li><span data-term="sans">小角中子散射</span></li>
        <li><span data-term="forward-scattering">前向散射</span></li>
      </ul>
