      <h1>系综优化方法</h1>
      <p class="subtitle-en">ensemble optimization method</p>

      <h2>定义</h2>
      <p><strong>EOM</strong>（Ensemble Optimization Method）等系综方法承认柔性分子的 $I(q)$ 是多构象平均，从预生成构象池中优化权重/子集以匹配实验曲线。</p>

      <h2>物理直觉</h2>
      <p>输出应强调 $R_g$、$D_{\max}$ 等参数的分布相对随机池的变化；把 EOM「代表构象」当唯一晶体式结构是误用。</p>
