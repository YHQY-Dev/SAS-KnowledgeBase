      <h1>持续长度</h1>
      <p class="subtitle-en">persistence length</p>

      <h2>定义</h2>
      <p><strong>持续长度</strong> $l_p$ 刻画链方向相关性：$l_p$ 大则链更刚直。蠕虫状链模型的 $P(q)$ 在 $q\sim 1/l_p$ 附近呈现特征过渡。</p>

      <h2>物理直觉</h2>
      <p>与 $R_g$、轮廓长度 $L$ 一起约束链模型；溶剂品质与温度会改变有效 $l_p$。</p>

      <h2>相关词条</h2>
