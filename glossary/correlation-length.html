      <h1>关联长度</h1>
      <p class="subtitle-en">correlation length</p>

      <h2>定义</h2>
      <p><strong>关联长度</strong> $\xi$ 描述空间相关函数的衰减尺度。无序相宽峰的半高宽常与 $1/\xi$ 相联系；临界涨落中 $\xi$ 发散。</p>

      <h2>物理直觉</h2>
      <p>不要把 $\xi$ 与 Bragg 畴间距 $d=2\pi/q^*$ 混用：前者是关联范围，后者是周期。</p>
